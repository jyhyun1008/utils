<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clock</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #000;
    font-family: 'Georgia', serif;
  }

  /* YouTube background */
  #yt-wrap {
    position: fixed;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
    z-index: 0;
  }

  #yt-wrap iframe {
    position: absolute;
    top: 50%; left: 50%;
    /* cover viewport regardless of aspect ratio */
    width: 100vw;
    height: 56.25vw;   /* 16:9 */
    min-height: 100vh;
    min-width: 177.78vh; /* 16:9 */
    transform: translate(-50%, -50%);
    border: none;
  }

  /* Clock wrapper */
  #clock-wrap {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
    pointer-events: none;
  }

  #clock-face {
    width: min(78vmin, 520px);
    height: min(78vmin, 520px);
    border-radius: 50%;
    background: rgba(255,255,255,0.10);
    backdrop-filter: blur(14px) saturate(1.2);
    -webkit-backdrop-filter: blur(14px) saturate(1.2);
    border: 2px solid rgba(255,255,255,0.28);
    box-shadow:
      0 8px 48px rgba(0,0,0,0.35),
      inset 0 1px 0 rgba(255,255,255,0.35);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  #clock-face svg {
    width: 100%;
    height: 100%;
    position: absolute;
    inset: 0;
    overflow: visible;
  }

  /* Sound controls */
  #sound-ctrl {
    position: fixed;
    bottom: 28px;
    right: 28px;
    z-index: 20;
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(255,255,255,0.13);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 28px;
    padding: 8px 14px 8px 10px;
    transition: opacity 0.2s;
  }

  #sound-btn {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: none;
    border: none;
    color: rgba(255,255,255,0.85);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    padding: 0;
    transition: color 0.2s, transform 0.15s;
  }
  #sound-btn:hover { color: #fff; transform: scale(1.1); }
  #sound-btn svg { width: 20px; height: 20px; }

  #vol-slider {
    -webkit-appearance: none;
    appearance: none;
    width: 90px;
    height: 3px;
    border-radius: 2px;
    background: rgba(255,255,255,0.3);
    outline: none;
    cursor: pointer;
  }
  #vol-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: rgba(255,255,255,0.9);
    cursor: pointer;
    transition: transform 0.15s;
  }
  #vol-slider::-webkit-slider-thumb:hover { transform: scale(1.2); }
  #vol-slider::-moz-range-thumb {
    width: 14px; height: 14px;
    border-radius: 50%;
    background: rgba(255,255,255,0.9);
    border: none;
    cursor: pointer;
  }
</style>
</head>
<body>

<!-- YouTube background -->
<div id="yt-wrap">
  <iframe id="yt-iframe"
    src="https://www.youtube.com/embed/nta1YhicoGw?autoplay=1&mute=1&loop=1&playlist=nta1YhicoGw&controls=0&showinfo=0&rel=0&modestbranding=1&iv_load_policy=3&disablekb=1&playsinline=1&enablejsapi=1"
    allow="autoplay; encrypted-media"
    allowfullscreen>
  </iframe>
</div>

<!-- Clock -->
<div id="clock-wrap">
  <div id="clock-face">
    <svg id="clock-svg" viewBox="-110 -110 220 220" xmlns="http://www.w3.org/2000/svg">
      <g id="ticks" stroke="rgba(255,255,255,0.75)" stroke-linecap="round"></g>
      <g id="numbers" font-family="Georgia, serif" fill="rgba(255,255,255,0.95)" text-anchor="middle" dominant-baseline="central"></g>
      <circle cx="0" cy="0" r="5.5" fill="rgba(255,255,255,0.25)"/>
      <line id="hand-h" x1="0" y1="0" x2="0" y2="-52" stroke="rgba(255,255,255,0.95)" stroke-width="5" stroke-linecap="round"/>
      <line id="hand-m" x1="0" y1="0" x2="0" y2="-72" stroke="rgba(255,255,255,0.90)" stroke-width="3.5" stroke-linecap="round"/>
      <line id="hand-s" x1="0" y1="6" x2="0" y2="-80" stroke="rgba(255,200,100,0.95)" stroke-width="1.8" stroke-linecap="round"/>
      <circle cx="0" cy="0" r="3.5" fill="rgba(255,220,120,0.95)"/>
    </svg>
  </div>
</div>

<!-- Sound controls -->
<div id="sound-ctrl">
  <button id="sound-btn" title="소리 켜기/끄기" onclick="toggleSound()">
    <svg id="sound-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M9 9v6h4l5 5V4l-5 5H9z"/>
      <line x1="3" y1="3" x2="21" y2="21"/>
    </svg>
  </button>
  <input id="vol-slider" type="range" min="0" max="100" value="70" oninput="setVolume(this.value)">
</div>

<script>
// ── Clock face ──
(function buildClockFace() {
  const ticksG   = document.getElementById('ticks');
  const numbersG = document.getElementById('numbers');

  for (let i = 0; i < 60; i++) {
    const ang = (i / 60) * Math.PI * 2 - Math.PI / 2;
    const isMajor = i % 5 === 0;
    const r1 = isMajor ? 86 : 91;
    const r2 = 100;
    const x1 = Math.cos(ang) * r1, y1 = Math.sin(ang) * r1;
    const x2 = Math.cos(ang) * r2, y2 = Math.sin(ang) * r2;
    const line = document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1', x1); line.setAttribute('y1', y1);
    line.setAttribute('x2', x2); line.setAttribute('y2', y2);
    line.setAttribute('stroke-width', isMajor ? '2.2' : '1');
    ticksG.appendChild(line);
  }

  for (let n = 1; n <= 12; n++) {
    const ang = (n / 12) * Math.PI * 2 - Math.PI / 2;
    const x = Math.cos(ang) * 74, y = Math.sin(ang) * 74;
    const txt = document.createElementNS('http://www.w3.org/2000/svg','text');
    txt.setAttribute('x', x); txt.setAttribute('y', y);
    txt.setAttribute('font-size', '13.5');
    txt.setAttribute('font-weight', '500');
    txt.textContent = n;
    numbersG.appendChild(txt);
  }
})();

// ── Clock hands ──
function updateClock() {
  const now = new Date();
  const s = now.getSeconds() + now.getMilliseconds() / 1000;
  const m = now.getMinutes() + s / 60;
  const h = (now.getHours() % 12) + m / 60;

  document.getElementById('hand-h').setAttribute('transform', `rotate(${h / 12 * 360})`);
  document.getElementById('hand-m').setAttribute('transform', `rotate(${m / 60 * 360})`);
  document.getElementById('hand-s').setAttribute('transform', `rotate(${s / 60 * 360})`);

  requestAnimationFrame(updateClock);
}
updateClock();

// ── YouTube IFrame API ──
const SVG_MUTED  = `<path d="M9 9v6h4l5 5V4l-5 5H9z"/><line x1="3" y1="3" x2="21" y2="21"/>`;
const SVG_LOW    = `<path d="M9 9v6h4l5 5V4l-5 5H9z"/><path d="M15 8a5 5 0 0 1 0 8"/>`;
const SVG_HIGH   = `<path d="M9 9v6h4l5 5V4l-5 5H9z"/><path d="M15 8a5 5 0 0 1 0 8"/><path d="M17.7 5a9 9 0 0 1 0 14"/>`;

let player;
let isMuted = true;

window.onYouTubeIframeAPIReady = function() {
  player = new YT.Player('yt-iframe', {
    events: {
      onReady: e => {
        e.target.mute();
        e.target.playVideo();
      },
      onStateChange: e => {
        if (e.data === YT.PlayerState.ENDED) e.target.playVideo();
      }
    }
  });
};

function updateSoundIcon(vol, muted) {
  const icon = document.getElementById('sound-icon');
  if (muted || vol == 0) icon.innerHTML = SVG_MUTED;
  else if (vol < 50)     icon.innerHTML = SVG_LOW;
  else                   icon.innerHTML = SVG_HIGH;
}

function toggleSound() {
  if (!player) return;
  const slider = document.getElementById('vol-slider');
  if (isMuted) {
    player.unMute();
    const vol = parseInt(slider.value);
    player.setVolume(vol);
    isMuted = false;
    updateSoundIcon(vol, false);
  } else {
    player.mute();
    isMuted = true;
    updateSoundIcon(0, true);
  }
}

function setVolume(val) {
  if (!player) return;
  const v = parseInt(val);
  if (v === 0) {
    player.mute();
    isMuted = true;
  } else {
    player.unMute();
    player.setVolume(v);
    isMuted = false;
  }
  updateSoundIcon(v, isMuted);
}

// Load IFrame API
const tag = document.createElement('script');
tag.src = 'https://www.youtube.com/iframe_api';
document.head.appendChild(tag);
</script>
</body>
</html>
