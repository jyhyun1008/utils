<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>연습 룰렛</title>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #F6F4F0;
      --surface: #FFFFFF;
      --border: #E4E0D8;
      --border-2: #F0EDE8;
      --text: #1C1916;
      --text-2: #7A756C;
      --text-3: #A89F96;
      --accent: #E8511A;
      --accent-dark: #C93F0B;
      --accent-bg: #FFF3EE;
      --key-bg: #F0EDE8;
      --shadow-sm: 0 1px 4px rgba(0,0,0,0.06);
      --shadow: 0 2px 16px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.04);
      --r: 14px;
    }

    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 18px 32px;
      display: flex;
      align-items: center;
      gap: 10px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo-mark {
      width: 32px; height: 32px;
      background: var(--accent);
      border-radius: 8px;
      color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
    }
    header h1 {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 1.2rem;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    /* ── LAYOUT ── */
    .page {
      display: grid;
      grid-template-columns: 1fr 360px;
      gap: 24px;
      padding: 28px 32px;
      max-width: 1100px;
      margin: 0 auto;
    }

    /* ── LEFT: MAIN ROULETTE ── */
    .left-col {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .wheel-card {
      background: var(--surface);
      border-radius: var(--r);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      padding: 28px 28px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .section-label {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-3);
      align-self: flex-start;
    }

    .wheel-area {
      position: relative;
      user-select: none;
    }

    /* pointer triangle */
    .pointer {
      position: absolute;
      top: -4px;
      left: 50%;
      transform: translateX(-50%);
      width: 0; height: 0;
      border-left: 13px solid transparent;
      border-right: 13px solid transparent;
      border-top: 26px solid var(--accent);
      filter: drop-shadow(0 3px 6px rgba(232,81,26,0.35));
      z-index: 10;
    }

    #mainCanvas {
      display: block;
      border-radius: 50%;
      box-shadow: 0 4px 32px rgba(0,0,0,0.12);
    }

    .result-row {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .result-pill {
      flex: 1;
      background: var(--accent-bg);
      border: 1px solid rgba(232,81,26,0.18);
      border-radius: 10px;
      padding: 14px 20px;
    }
    .result-pill .label {
      font-size: 0.66rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 3px;
    }
    .result-pill .value {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
      line-height: 1.2;
      min-height: 1.8rem;
      transition: opacity 0.2s;
    }

    .spin-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 14px 28px;
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      cursor: pointer;
      transition: background 0.18s, transform 0.1s, box-shadow 0.18s;
      box-shadow: 0 2px 12px rgba(232,81,26,0.3);
      white-space: nowrap;
      display: inline-flex;
      align-items: center;
      gap: 7px;
    }
    .spin-btn svg { width: 18px; height: 18px; flex-shrink: 0; }
    .spin-btn:hover { background: var(--accent-dark); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(232,81,26,0.4); }
    .spin-btn:active { transform: translateY(0); }
    .spin-btn:disabled { background: #C4BDB5; cursor: not-allowed; transform: none; box-shadow: none; }

    /* ── RIGHT COL ── */
    .right-col {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .card {
      background: var(--surface);
      border-radius: var(--r);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .card-head {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border-2);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .card-head-title {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 0.88rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      display: flex; align-items: center; gap: 7px;
    }
    .card-head-sub {
      font-size: 0.72rem;
      color: var(--text-3);
      font-weight: 400;
    }

    /* ── 12-KEY ROULETTE ── */
    .key-body {
      padding: 16px 18px 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .key-big-result {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 2.4rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: var(--accent);
      min-height: 2.8rem;
      text-align: center;
      line-height: 1;
    }

    .key-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 5px;
      width: 100%;
    }

    .key-chip {
      background: var(--key-bg);
      border: 1.5px solid transparent;
      border-radius: 7px;
      padding: 7px 2px;
      text-align: center;
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-2);
      transition: background 0.12s, border-color 0.12s, color 0.12s, transform 0.12s;
    }

    .key-chip.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      transform: scale(1.08);
      box-shadow: 0 2px 8px rgba(232,81,26,0.3);
    }

    .key-chip.winner {
      background: var(--accent-bg);
      border-color: var(--accent);
      color: var(--accent);
    }

    .mini-spin-btn {
      background: var(--text);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 8px 22px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      letter-spacing: 0.02em;
    }
    .mini-spin-btn:hover { background: #333; }
    .mini-spin-btn:disabled { background: #C4BDB5; cursor: not-allowed; }

    /* ── PRACTICE LIST ── */
    .list-items {
      max-height: 340px;
      overflow-y: auto;
    }
    .list-items::-webkit-scrollbar { width: 4px; }
    .list-items::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .practice-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border-2);
      transition: background 0.12s;
    }
    .practice-item:hover { background: var(--bg); }
    .practice-item:last-child { border-bottom: none; }

    .color-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .item-label {
      flex: 1;
      font-size: 0.88rem;
      font-weight: 500;
      color: var(--text);
      line-height: 1.3;
    }

    .edit-input {
      flex: 1;
      border: 1.5px solid var(--accent);
      border-radius: 6px;
      padding: 3px 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      outline: none;
      color: var(--text);
      background: var(--accent-bg);
    }

    .item-btns {
      display: flex;
      gap: 2px;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .practice-item:hover .item-btns { opacity: 1; }
    .practice-item:has(.edit-input) .item-btns { opacity: 1; }

    .icon-btn {
      background: none;
      border: none;
      padding: 5px;
      border-radius: 6px;
      cursor: pointer;
      color: var(--text-2);
      display: flex; align-items: center;
      transition: background 0.12s, color 0.12s;
      line-height: 1;
    }
    .icon-btn:hover { background: var(--bg); color: var(--text); }
    .icon-btn.del:hover { background: #FEE2E2; color: #DC2626; }

    .empty-state {
      padding: 36px 20px;
      text-align: center;
      color: var(--text-3);
      font-size: 0.85rem;
      line-height: 1.6;
    }

    .add-form {
      padding: 12px 16px;
      border-top: 1px solid var(--border-2);
      display: flex;
      gap: 8px;
    }
    .add-input {
      flex: 1;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      outline: none;
      color: var(--text);
      transition: border-color 0.18s;
    }
    .add-input:focus { border-color: var(--accent); }
    .add-input::placeholder { color: var(--text-3); }

    .add-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .add-btn:hover { background: var(--accent-dark); }

    .badge {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 2px 8px;
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--text-2);
    }

    /* ── RHYTHM ROULETTE ── */
    .rhythm-body {
      padding: 16px 18px 18px;
    }
    .rhythm-row {
      display: flex;
      align-items: center;
      gap: 18px;
    }
    .rhythm-wheel-wrap {
      position: relative;
      flex-shrink: 0;
    }
    .rhythm-pointer {
      position: absolute;
      top: -4px;
      left: 50%;
      transform: translateX(-50%);
      width: 0; height: 0;
      border-left: 9px solid transparent;
      border-right: 9px solid transparent;
      border-top: 18px solid var(--accent);
      filter: drop-shadow(0 2px 4px rgba(232,81,26,.3));
      z-index: 10;
    }
    #rhythmCanvas {
      display: block;
      border-radius: 50%;
      box-shadow: 0 3px 18px rgba(0,0,0,0.1);
    }
    .rhythm-info {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .rhythm-result-label {
      font-size: 0.66rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-3);
    }
    .rhythm-result-value {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 1.45rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--text);
      line-height: 1.1;
      transition: color 0.3s;
    }
    .rhythm-legend {
      display: flex;
      flex-direction: column;
      gap: 5px;
      margin-top: 2px;
    }
    .rhythm-legend-item {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 0.75rem;
      color: var(--text-2);
    }
    .rhythm-legend-swatch {
      width: 10px; height: 10px;
      border-radius: 3px;
      flex-shrink: 0;
    }
    .rhythm-legend-pct {
      margin-left: auto;
      font-size: 0.7rem;
      color: var(--text-3);
      font-weight: 600;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 820px) {
      .page { grid-template-columns: 1fr; padding: 16px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo-mark"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 12a1 1 0 1 0 2 0a1 1 0 1 0-2 0"/><path d="M7 12a5 5 0 1 0 10 0a5 5 0 1 0-10 0"/><path d="M3 12a9 9 0 1 0 18 0a9 9 0 1 0-18 0"/></svg></div>
  <h1>연습 룰렛</h1>
</header>

<div class="page">
  <!-- LEFT: Main Roulette -->
  <div class="left-col">
    <div class="wheel-card">
      <span class="section-label">메인 연습 룰렛</span>
      <div class="wheel-area">
        <div class="pointer"></div>
        <canvas id="mainCanvas" width="460" height="460"></canvas>
      </div>
      <div class="result-row">
        <div class="result-pill">
          <div class="label">결과</div>
          <div class="value" id="mainResultText">스핀을 눌러보세요!</div>
        </div>
        <button class="spin-btn" id="mainSpinBtn" onclick="spinMain()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><circle cx="8.5" cy="8.5" r=".5" fill="currentColor"/><circle cx="15.5" cy="8.5" r=".5" fill="currentColor"/><circle cx="15.5" cy="15.5" r=".5" fill="currentColor"/><circle cx="8.5" cy="15.5" r=".5" fill="currentColor"/></svg> SPIN!</button>
      </div>
    </div>
  </div>

  <!-- RIGHT: Rhythm roulette + Key roulette + list -->
  <div class="right-col">

    <!-- Rhythm Roulette -->
    <div class="card">
      <div class="card-head">
        <div class="card-head-title">
          <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 17a3 3 0 1 0 6 0a3 3 0 0 0-6 0m6 0V7l12-2v10m0 0a3 3 0 1 0-6 0a3 3 0 0 0 6 0m-6 0V5"/></svg>
          리듬 룰렛
        </div>
        <button class="mini-spin-btn" id="rhythmSpinBtn" onclick="spinRhythm()">SPIN</button>
      </div>
      <div class="rhythm-body">
        <div class="rhythm-row">
          <div class="rhythm-wheel-wrap">
            <div class="rhythm-pointer"></div>
            <canvas id="rhythmCanvas" width="170" height="170"></canvas>
          </div>
          <div class="rhythm-info">
            <div>
              <div class="rhythm-result-label">결과</div>
              <div class="rhythm-result-value" id="rhythmResult">—</div>
            </div>
            <div class="rhythm-legend">
              <div class="rhythm-legend-item">
                <div class="rhythm-legend-swatch" style="background:#4AAFDB"></div>
                <span>스트레이트</span>
                <span class="rhythm-legend-pct">75%</span>
              </div>
              <div class="rhythm-legend-item">
                <div class="rhythm-legend-swatch" style="background:#B07DE8"></div>
                <span>스윙</span>
                <span class="rhythm-legend-pct">25%</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- 12-Key Roulette -->
    <div class="card">
      <div class="card-head">
        <div class="card-head-title">
          <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 17a3 3 0 1 0 6 0a3 3 0 0 0-6 0m6 0V7l12-2v10m0 0a3 3 0 1 0-6 0a3 3 0 0 0 6 0m-6 0V5"/></svg>
          12키 룰렛
        </div>
        <button class="mini-spin-btn" id="keySpinBtn" onclick="spinKey()">SPIN</button>
      </div>
      <div class="key-body">
        <div class="key-big-result" id="keyResult">—</div>
        <div class="key-grid" id="keyGrid"></div>
      </div>
    </div>

    <!-- Practice List -->
    <div class="card">
      <div class="card-head">
        <div class="card-head-title">
          <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6h11M9 12h11M9 18h11M5 6v.01M5 12v.01M5 18v.01"/></svg>
          연습 목록
        </div>
        <span class="badge" id="itemCount">0개</span>
      </div>
      <div class="list-items" id="listItems"></div>
      <div class="add-form">
        <input type="text" class="add-input" id="newInput" placeholder="새 연습 항목 추가..."
               onkeydown="if(event.key==='Enter') addItem()">
        <button class="add-btn" onclick="addItem()">+ 추가</button>
      </div>
    </div>

  </div>
</div>

<script>
  /* ═══════════════════════════════════════════
     STATE
  ═══════════════════════════════════════════ */
  const COLORS = [
    '#FF6B6B','#FF9A3C','#FFD166','#8BC34A',
    '#26C6DA','#7C4DFF','#F06292','#26A69A',
    '#FF7043','#42A5F5','#66BB6A','#AB47BC',
    '#EC407A','#29B6F6','#FFA726','#78909C'
  ];

  const KEYS = ['C','D♭','D','E♭','E','F','G♭','G','A♭','A','B♭','B'];

  let practices = [
    '크로매틱', '스케일', '스케일 (인터벌)', '투옥타브',
    '0-4프렛 다이아토닉 코드톤', '블럭폼', '모드', '모드 (인터벌)'
  ];

  let mainRotation = 0;
  let mainSpinning = false;
  let keySpinning = false;
  let editIdx = -1;

  /* ═══════════════════════════════════════════
     CANVAS WHEEL
  ═══════════════════════════════════════════ */
  const canvas = document.getElementById('mainCanvas');
  const ctx = canvas.getContext('2d');

  function drawWheel() {
    const W = canvas.width, H = canvas.height;
    const cx = W / 2, cy = H / 2;
    const r = Math.min(cx, cy) - 10;

    ctx.clearRect(0, 0, W, H);

    if (practices.length === 0) {
      // Empty wheel
      ctx.save();
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, 2 * Math.PI);
      ctx.fillStyle = '#F0EDE8';
      ctx.fill();
      ctx.fillStyle = '#A89F96';
      ctx.font = '500 15px "DM Sans"';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('연습 항목을 추가해주세요', cx, cy);
      ctx.restore();
      return;
    }

    const n = practices.length;
    const slice = (2 * Math.PI) / n;

    // Draw slices
    for (let i = 0; i < n; i++) {
      const startA = mainRotation - Math.PI / 2 + i * slice;
      const endA = startA + slice;

      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.arc(cx, cy, r, startA, endA);
      ctx.closePath();
      ctx.fillStyle = COLORS[i % COLORS.length];
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.55)';
      ctx.lineWidth = 2.5;
      ctx.stroke();
    }

    // Draw text on slices
    ctx.save();
    for (let i = 0; i < n; i++) {
      const startA = mainRotation - Math.PI / 2 + i * slice;
      const midA = startA + slice / 2;
      const textR = r * 0.65;
      const tx = cx + textR * Math.cos(midA);
      const ty = cy + textR * Math.sin(midA);

      ctx.save();
      ctx.translate(tx, ty);
      ctx.rotate(midA + Math.PI / 2);
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      const fontSize = n > 12 ? 10 : n > 8 ? 12 : n > 5 ? 13 : 14;
      ctx.font = `600 ${fontSize}px "DM Sans"`;
      ctx.fillStyle = 'rgba(255,255,255,0.95)';

      // Measure & truncate
      const maxW = r * (slice > 0.8 ? 0.52 : 0.48);
      let label = practices[i];
      while (label.length > 2 && ctx.measureText(label).width > maxW) {
        label = label.slice(0, -1);
      }
      if (label !== practices[i]) label += '…';

      // Text shadow for legibility
      ctx.shadowColor = 'rgba(0,0,0,0.25)';
      ctx.shadowBlur = 3;
      ctx.fillText(label, 0, 0);
      ctx.restore();
    }
    ctx.restore();

    // Outer rim
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, 2 * Math.PI);
    ctx.strokeStyle = 'rgba(255,255,255,0.25)';
    ctx.lineWidth = 4;
    ctx.stroke();

    // Center hub
    ctx.beginPath();
    ctx.arc(cx, cy, 24, 0, 2 * Math.PI);
    ctx.fillStyle = '#fff';
    ctx.fill();
    ctx.strokeStyle = '#E4E0D8';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Center dot
    ctx.beginPath();
    ctx.arc(cx, cy, 7, 0, 2 * Math.PI);
    ctx.fillStyle = '#E8511A';
    ctx.fill();
  }

  /* ═══════════════════════════════════════════
     SPIN MAIN
  ═══════════════════════════════════════════ */
  function easeOut(t) { return 1 - Math.pow(1 - t, 4); }

  function spinMain() {
    if (mainSpinning || practices.length === 0) return;
    mainSpinning = true;
    document.getElementById('mainSpinBtn').disabled = true;
    document.getElementById('mainResultText').textContent = '...';

    const extraRot = (7 + Math.random() * 5) * 2 * Math.PI;
    const targetOffset = Math.random() * 2 * Math.PI;
    const start = mainRotation;
    const target = start + extraRot + targetOffset;
    const duration = 3800 + Math.random() * 1400;
    const t0 = performance.now();

    function frame(now) {
      const p = Math.min((now - t0) / duration, 1);
      mainRotation = start + (target - start) * easeOut(p);
      drawWheel();

      if (p < 1) {
        requestAnimationFrame(frame);
      } else {
        mainRotation = mainRotation % (2 * Math.PI);
        mainSpinning = false;
        document.getElementById('mainSpinBtn').disabled = false;

        // Which slice is at the top (pointer)?
        const n = practices.length;
        const slice = (2 * Math.PI) / n;
        const norm = ((-mainRotation) % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI);
        const idx = Math.floor(norm / slice) % n;
        document.getElementById('mainResultText').textContent = practices[idx];
      }
    }

    requestAnimationFrame(frame);
  }

  /* ═══════════════════════════════════════════
     12-KEY ROULETTE
  ═══════════════════════════════════════════ */
  let winnerKey = -1;

  function renderKeyGrid(activeIdx) {
    document.getElementById('keyGrid').innerHTML = KEYS.map((k, i) => {
      const cls = i === activeIdx ? 'key-chip active'
                : (activeIdx === -1 && i === winnerKey) ? 'key-chip winner'
                : 'key-chip';
      return `<div class="${cls}">${k}</div>`;
    }).join('');
  }

  function spinKey() {
    if (keySpinning) return;
    keySpinning = true;
    document.getElementById('keySpinBtn').disabled = true;
    document.getElementById('keyResult').textContent = '...';
    winnerKey = -1;

    const final = Math.floor(Math.random() * 12);
    const totalSteps = 24 + final; // lands on finalIdx after 2 full cycles + final
    let step = 0;
    let delay = 50;

    function tick() {
      const cur = step % 12;
      renderKeyGrid(cur);
      step++;

      if (step >= totalSteps) {
        // Show winner
        winnerKey = final;
        renderKeyGrid(-1);
        document.getElementById('keyResult').textContent = KEYS[final];
        keySpinning = false;
        document.getElementById('keySpinBtn').disabled = false;
        return;
      }

      // Ease out: speed up slightly then slow down
      const progress = step / totalSteps;
      if (progress < 0.3) delay = Math.max(delay * 0.92, 45);
      else if (progress > 0.65) delay = Math.min(delay * 1.16, 280);

      setTimeout(tick, delay);
    }

    tick();
  }

  /* ═══════════════════════════════════════════
     PRACTICE LIST
  ═══════════════════════════════════════════ */
  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  const EDIT_ICON = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14c0 1.1.9 2 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`;
  const DEL_ICON  = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3,6 5,6 21,6"/><path d="M19,6v14a2,2,0,0,1-2,2H7a2,2,0,0,1-2-2V6m3,0V4a1,1,0,0,1,1-1h4a1,1,0,0,1,1,1v2"/></svg>`;
  const OK_ICON   = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20,6 9,17 4,12"/></svg>`;
  const X_ICON    = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`;

  function renderList() {
    document.getElementById('itemCount').textContent = `${practices.length}개`;
    const el = document.getElementById('listItems');

    if (practices.length === 0) {
      el.innerHTML = `<div class="empty-state">아직 항목이 없어요.<br>아래에서 연습을 추가해보세요 👇</div>`;
      drawWheel();
      return;
    }

    el.innerHTML = practices.map((p, i) => {
      const dot = `<div class="color-dot" style="background:${COLORS[i % COLORS.length]}"></div>`;
      if (editIdx === i) {
        return `<div class="practice-item">
          ${dot}
          <input class="edit-input" id="ei_${i}" value="${esc(p)}"
            onkeydown="if(event.key==='Enter')saveEdit(${i});else if(event.key==='Escape')cancelEdit()">
          <div class="item-btns">
            <button class="icon-btn" onclick="saveEdit(${i})" title="저장">${OK_ICON}</button>
            <button class="icon-btn" onclick="cancelEdit()" title="취소">${X_ICON}</button>
          </div>
        </div>`;
      }
      return `<div class="practice-item">
        ${dot}
        <span class="item-label">${esc(p)}</span>
        <div class="item-btns">
          <button class="icon-btn" onclick="startEdit(${i})" title="수정">${EDIT_ICON}</button>
          <button class="icon-btn del" onclick="removeItem(${i})" title="삭제">${DEL_ICON}</button>
        </div>
      </div>`;
    }).join('');

    if (editIdx >= 0) {
      const inp = document.getElementById(`ei_${editIdx}`);
      if (inp) { inp.focus(); inp.select(); }
    }

    drawWheel();
  }

  function addItem() {
    const inp = document.getElementById('newInput');
    const v = inp.value.trim();
    if (!v) return;
    practices.push(v);
    inp.value = '';
    renderList();
  }

  function removeItem(i) {
    practices.splice(i, 1);
    if (editIdx === i) editIdx = -1;
    else if (editIdx > i) editIdx--;
    renderList();
  }

  function startEdit(i) { editIdx = i; renderList(); }

  function saveEdit(i) {
    const inp = document.getElementById(`ei_${i}`);
    if (inp) {
      const v = inp.value.trim();
      if (v) practices[i] = v;
    }
    editIdx = -1;
    renderList();
  }

  function cancelEdit() { editIdx = -1; renderList(); }

  /* ═══════════════════════════════════════════
     RHYTHM ROULETTE
  ═══════════════════════════════════════════ */
  const RHYTHM = [
    { label: '스트레이트', weight: 75, color: '#4AAFDB' },
    { label: '스윙',       weight: 25, color: '#B07DE8' },
  ];
  const RHYTHM_TOTAL = 100;

  let rhythmRotation = 0;
  let rhythmSpinning = false;

  const rhythmCanvas = document.getElementById('rhythmCanvas');
  const rCtx = rhythmCanvas.getContext('2d');

  function drawRhythmWheel() {
    const W = rhythmCanvas.width, H = rhythmCanvas.height;
    const cx = W / 2, cy = H / 2;
    const r = Math.min(cx, cy) - 8;

    rCtx.clearRect(0, 0, W, H);

    let startA = rhythmRotation - Math.PI / 2;
    for (const seg of RHYTHM) {
      const sweep = (seg.weight / RHYTHM_TOTAL) * 2 * Math.PI;
      const endA = startA + sweep;

      rCtx.beginPath();
      rCtx.moveTo(cx, cy);
      rCtx.arc(cx, cy, r, startA, endA);
      rCtx.closePath();
      rCtx.fillStyle = seg.color;
      rCtx.fill();
      rCtx.strokeStyle = 'rgba(255,255,255,0.6)';
      rCtx.lineWidth = 2;
      rCtx.stroke();

      const midA = startA + sweep / 2;
      const textR = r * 0.6;
      const tx = cx + textR * Math.cos(midA);
      const ty = cy + textR * Math.sin(midA);

      rCtx.save();
      rCtx.translate(tx, ty);
      rCtx.rotate(midA + Math.PI / 2);
      rCtx.textAlign = 'center';
      rCtx.textBaseline = 'middle';
      rCtx.font = '600 11px "DM Sans"';
      rCtx.fillStyle = 'rgba(255,255,255,0.95)';
      rCtx.shadowColor = 'rgba(0,0,0,0.2)';
      rCtx.shadowBlur = 2;
      rCtx.fillText(seg.label, 0, 0);
      rCtx.restore();

      startA = endA;
    }

    // Rim
    rCtx.beginPath();
    rCtx.arc(cx, cy, r, 0, 2 * Math.PI);
    rCtx.strokeStyle = 'rgba(255,255,255,0.25)';
    rCtx.lineWidth = 3;
    rCtx.stroke();

    // Hub
    rCtx.beginPath();
    rCtx.arc(cx, cy, 16, 0, 2 * Math.PI);
    rCtx.fillStyle = '#fff';
    rCtx.fill();
    rCtx.strokeStyle = '#E4E0D8';
    rCtx.lineWidth = 1.5;
    rCtx.stroke();

    rCtx.beginPath();
    rCtx.arc(cx, cy, 5, 0, 2 * Math.PI);
    rCtx.fillStyle = '#E8511A';
    rCtx.fill();
  }

  function spinRhythm() {
    if (rhythmSpinning) return;
    rhythmSpinning = true;
    document.getElementById('rhythmSpinBtn').disabled = true;
    document.getElementById('rhythmResult').textContent = '...';
    document.getElementById('rhythmResult').style.color = '';

    const winIdx = Math.random() < 0.75 ? 0 : 1;

    // Compute target wheel angle for winner segment
    let segStart = 0;
    for (let i = 0; i < winIdx; i++) segStart += (RHYTHM[i].weight / RHYTHM_TOTAL) * 2 * Math.PI;
    const segSweep = (RHYTHM[winIdx].weight / RHYTHM_TOTAL) * 2 * Math.PI;
    const targetAngle = segStart + segSweep * (0.1 + Math.random() * 0.8);

    // The pointer (top) lands on wheel angle = (-rotation) mod 2π
    // So we need rotation mod 2π = (2π - targetAngle) mod 2π
    const targetMod = ((2 * Math.PI - targetAngle) % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI);
    const currentMod = ((rhythmRotation % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI);
    let delta = (targetMod - currentMod + 2 * Math.PI) % (2 * Math.PI);
    if (delta < 0.15) delta += 2 * Math.PI;

    const extraLaps = 4 + Math.floor(Math.random() * 3);
    const totalRot = extraLaps * 2 * Math.PI + delta;
    const startRot = rhythmRotation;
    const duration = 2600 + Math.random() * 800;
    const t0 = performance.now();

    function frame(now) {
      const p = Math.min((now - t0) / duration, 1);
      rhythmRotation = startRot + totalRot * easeOut(p);
      drawRhythmWheel();

      if (p < 1) {
        requestAnimationFrame(frame);
      } else {
        rhythmSpinning = false;
        document.getElementById('rhythmSpinBtn').disabled = false;
        const el = document.getElementById('rhythmResult');
        el.textContent = RHYTHM[winIdx].label;
        el.style.color = RHYTHM[winIdx].color;
      }
    }

    requestAnimationFrame(frame);
  }

  /* ═══════════════════════════════════════════
     INIT
  ═══════════════════════════════════════════ */
  drawRhythmWheel();
  renderList();
  renderKeyGrid(-1);
</script>
</body>
</html>
